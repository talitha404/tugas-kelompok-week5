<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Daftar</title>
  <link href="style.css" rel="stylesheet">
</head>
<body class="bg-black flex items-center justify-center min-h-screen">

  <!-- Card Form -->
  <div class="bg-[#1c1c1f]/90 backdrop-blur-md p-10 rounded-2xl w-96 shadow-xl">

    <!-- Judul -->
    <h2 class="text-white text-center text-xl mb-8 font-medium">
      Daftar
    </h2>

    <!-- Form -->
    <form id="signupForm" class="space-y-6">

      <!-- Email -->
      <div>
        <label class="text-gray-300 text-sm block mb-2">Email</label>
        <input
          type="email"
          id="email"
          class="w-full bg-[#2b2b30] text-white rounded-lg px-4 py-2 hover:ring-2 hover:ring-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
        <p id="emailError" class="text-red-400 text-sm mt-1 hidden"></p>
      </div>

      <!-- Password -->
      <div>
        <label class="text-gray-300 text-sm block mb-2">Sandi</label>
        <input
          type="password"
          id="password"
          class="w-full bg-[#2b2b30] text-white rounded-lg px-4 py-2 hover:ring-2 hover:ring-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
        <p id="passwordError" class="text-red-400 text-sm mt-1 hidden"></p>
      </div>

      <!-- Confirm Password -->
      <div>
        <label class="text-gray-300 text-sm block mb-2">Ulangi Sandi</label>
        <input
          type="password"
          id="confirmPassword"
          class="w-full bg-[#2b2b30] text-white rounded-lg px-4 py-2 hover:ring-2 hover:ring-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
        <p id="confirmPasswordError" class="text-red-400 text-sm mt-1 hidden"></p>
      </div>

      <!-- Button -->
      <button
        id="submitBtn"
        type="submit"
        class="w-full bg-gray-500 text-white py-2 rounded-lg hover:bg-blue-400 transition"
      >
        Daftar
      </button>

      <p id="formMessage" class="text-yellow-400 text-sm mt-2 text-center hidden">
        Silakan isi kolom yang ada terlebih dahulu
      </p>
    </form>

  </div>
  <script src="js/signup.js"></script>
</body>
</html>
